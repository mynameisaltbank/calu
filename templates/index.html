<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Protein & Nutrition Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-bottom: 25px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #eef2f7; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-box.protein { background: #e3f2fd; border-left: 5px solid #2196f3; }
        .stat-val { font-size: 22px; font-weight: bold; color: #1e88e5; }
        .upload-section { border: 2px dashed #b0bec5; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .upload-section:hover { border-color: #2196f3; background: #fafafa; }
        button { width: 100%; background: #2196f3; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1e88e5; }
        .btn-excel { background: #4caf50; margin-top: 10px; }
        .btn-excel:hover { background: #43a047; }
        #preview { max-width: 100%; max-height: 250px; margin-top: 15px; border-radius: 6px; display: none; }
        .meal-list { margin-top: 25px; }
        .meal-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        #loading { display: none; text-align: center; font-weight: bold; color: #ff9800; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍗 AI Protein Tracker</h1>
    
    <div class="dashboard">
        <div class="stat-box protein">
            <div>โปรตีนวันนี้</div>
            <div class="stat-val" id="today-protein">0.0 กรัม</div>
        </div>
        <div class="stat-box" style="border-left: 5px solid #ff9800;">
            <div>แคลอรีวันนี้</div>
            <div class="stat-val" style="color: #f57c00;" id="today-calories">0 kcal</div>
        </div>
    </div>

    <div class="upload-section" onclick="document.getElementById('imageInput').click()">
        <p style="margin:0; color:#607d8b;">📸 กดเพื่อถ่ายรูป หรือ เลือกรูปอาหาร</p>
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
        <img id="preview" alt="Food preview">
    </div>

    <button id="uploadBtn" onclick="uploadImage()">🚀 สแกนและบันทึกสารอาหาร</button>
    <div id="loading">⏳ AI กำลังวิเคราะห์และคำนวณสารอาหาร...</div>

    <a href="/api/export-excel" style="text-decoration: none;"><button class="btn-excel">📊 ดาวน์โหลดประวัติเป็น Excel (.xlsx)</button></a>

    <div class="meal-list">
        <h3>🍽️ รายการอาหารวันนี้</h3>
        <div id="mealsContainer"></div>
    </div>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const preview = document.getElementById('preview');
            preview.src = reader.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    async function loadDashboard() {
        const res = await fetch('/api/dashboard');
        const data = await res.json();
        document.getElementById('today-protein').innerText = data.protein.toFixed(1) + ' กรัม';
        document.getElementById('today-calories').innerText = data.calories.toFixed(0) + ' kcal';
        
        const container = document.getElementById('mealsContainer');
        container.innerHTML = '';
        if(data.meals.length === 0) {
            container.innerHTML = '<p style="color:#999; font-size:14px;">ยังไม่มีการบันทึกอาหารในวันนี้</p>';
        }
        data.meals.forEach(m => {
            container.innerHTML += `<div class="meal-item">
                <span>⏰ ${m.time} - <b>${m.name}</b></span>
                <span>💪 P: ${m.protein}g | 🔥 ${m.calories} kcal</span>
            </div>`;
        });
    }

    async function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        if(fileInput.files.length === 0) {
            alert('กรุณาเลือกรูปภาพก่อนครับ!');
            return;
        }
        
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        
        document.getElementById('uploadBtn').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        
        try {
            const res = await fetch('/api/scan', { method: 'POST', body: formData });
            const result = await res.json();
            if(result.status === 'success') {
                alert(`✨ สแกนสำเร็จ!\nเมนู: ${result.data.mealName}\nโปรตีน: ${result.data.protein}g`);
                document.getElementById('preview').style.display = 'none';
                fileInput.value = '';
                loadDashboard();
            } else {
                alert('เกิดข้อผิดพลาด: ' + result.error);
            }
        } catch(e) {
            alert('เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว');
        } finally {
            document.getElementById('uploadBtn').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
